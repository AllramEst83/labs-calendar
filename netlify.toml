[build]
  publish = "dist"
  functions = "netlify/functions"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  autoLaunch = false
  framework = "vite"

# API routes → Netlify Functions (production + local dev)
[[redirects]]
  from = "/api/events/:id"
  to = "/.netlify/functions/events/:id"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@netlify/blobs"]

# SPA fallback lives in public/_redirects (copied to dist/ on build).
# Do not add a catch-all here — it breaks Vite during `netlify dev`.
